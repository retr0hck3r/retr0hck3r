<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 90" width="100%" height="90">
  <defs>
    <!-- Glowing LED Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes glitch {
      0%, 92%, 96%, 100% { transform: none; filter: hue-rotate(0deg); }
      94% { transform: translate(-1.5px, 0.5px) skewX(1deg); filter: hue-rotate(60deg); }
      98% { transform: translate(1px, -0.5px); filter: hue-rotate(120deg); }
    }
    .bg { fill: #07090e; }
    .text-neon { font-family: 'Consolas', 'Courier New', monospace; font-size: 26px; font-weight: bold; fill: #00FF99; filter: url(#neon-glow); animation: glitch 7s infinite; }
    .text-sub { font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; fill: #00FF99; opacity: 0.7; }
    .window-dot { stroke: #00FF99; stroke-width: 1.5; fill: none; opacity: 0.5; }
    .window-dot-filled { fill: #00FF99; opacity: 0.8; }
    .status-light { fill: #00FF99; filter: url(#neon-glow); animation: blink 1.5s infinite; }
    .border-line { stroke: #00FF99; stroke-width: 1.5; stroke-opacity: 0.25; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />
  
  <!-- Terminal Border Window frame (Fully Closed) -->
  <path d="M 10,10 L 790,10 L 790,80 L 10,80 Z" fill="none" class="border-line" />
  <path d="M 10,40 L 790,40" class="border-line" />

  <!-- Terminal Window Controls (OS style minimize/maximize/close) -->
  <circle cx="30" cy="25" r="5" class="window-dot-filled" />
  <circle cx="48" cy="25" r="5" class="window-dot" />
  <circle cx="66" cy="25" r="5" class="window-dot" />
  
  <!-- Current SSH Connection Path -->
  <text x="400" y="29" text-anchor="middle" class="text-sub">session: ssh retr0@white-server</text>
  
  <!-- Status Online Indicator -->
  <circle cx="750" cy="25" r="4.5" class="status-light" />
  <text x="738" y="29" text-anchor="end" class="text-sub">SECURE CONNECTION</text>

  <!-- Main glowing screen prompt name -->
  <text x="30" y="67" class="text-neon">_> retr0hck3r</text>
  
  <!-- Network status metadata -->
  <text x="770" y="65" text-anchor="end" class="text-sub">LOC: 127.0.0.1 // PORT: 22</text>
</svg>
