<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <!-- Phosphor Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanline Gradient -->
    <linearGradient id="scanline-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FF99" stop-opacity="0" />
      <stop offset="50%" stop-color="#00FF99" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#00FF99" stop-opacity="0" />
    </linearGradient>
  </defs>
  <style>
    @keyframes scanline {
      0% { transform: translateY(-200px); }
      100% { transform: translateY(200px); }
    }
    .bg { fill: #07090e; }
    .text-neon { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #00FF99; filter: url(#neon-glow); }
    .text-green { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #00FF99; }
    .text-dim { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #008855; }
    .text-sub { font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; fill: #00FF99; opacity: 0.7; }
    
    .window-dot { stroke: #00FF99; stroke-width: 1.5; fill: none; opacity: 0.5; }
    .window-dot-filled { fill: #00FF99; opacity: 0.8; }
    .border-line { stroke: #00FF99; stroke-width: 1.5; stroke-opacity: 0.25; }
    .scanline { fill: url(#scanline-grad); animation: scanline 8s linear infinite; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />
  
  <!-- Terminal Border Window frame (Fully Closed) -->
  <path d="M 10,10 L 790,10 L 790,190 L 10,190 Z" fill="none" class="border-line" />
  <path d="M 10,40 L 790,40" class="border-line" />

  <!-- Terminal Window Controls -->
  <circle cx="30" cy="25" r="5" class="window-dot-filled" />
  <circle cx="48" cy="25" r="5" class="window-dot" />
  <circle cx="66" cy="25" r="5" class="window-dot" />
  
  <text x="400" y="29" text-anchor="middle" class="text-sub">session: cat /sys/devices/system/skills.status</text>

  <!-- Skills command -->
  <text x="30" y="65" class="text-dim">retr0@white-server:~$ cat /sys/devices/system/skills.status</text>
  
  <!-- Defensive (Primary - 90%) -->
  <text x="30" y="90" class="text-green text-neon">DEFENSIVE</text>
  <text x="130" y="90" class="text-green">[</text>
  <rect x="145" y="80" width="150" height="10" fill="#15202e" rx="2" />
  <rect x="145" y="80" width="129" height="10" fill="#00FF99" filter="url(#neon-glow)" rx="2" />
  <text x="305" y="90" class="text-green">] 86%</text>
  <text x="355" y="90" class="text-dim">(Astra Linux SE, Dallas Lock, SNS, Wireshark)</text>

  <!-- Offensive (Secondary - 60%) -->
  <text x="30" y="115" class="text-green text-neon">OFFENSIVE</text>
  <text x="130" y="115" class="text-green">[</text>
  <rect x="145" y="105" width="150" height="10" fill="#15202e" rx="2" />
  <rect x="145" y="105" width="63" height="10" fill="#00FF99" filter="url(#neon-glow)" rx="2" />
  <text x="305" y="115" class="text-green">] 42%</text>
  <text x="355" y="115" class="text-dim">(BurpSuite, Nmap, CTF)</text>

  <!-- Automation (80%) -->
  <text x="30" y="140" class="text-green text-neon">AUTOMATION</text>
  <text x="130" y="140" class="text-green">[</text>
  <rect x="145" y="130" width="150" height="10" fill="#15202e" rx="2" />
  <rect x="145" y="130" width="111" height="10" fill="#00FF99" filter="url(#neon-glow)" rx="2" />
  <text x="305" y="140" class="text-green">] 74%</text>
  <text x="355" y="140" class="text-dim">(Python, Bash, Docker, Git)</text>

  <!-- Research (70%) -->
  <text x="30" y="165" class="text-green text-neon">FOUNDATION</text>
  <text x="130" y="165" class="text-green">[</text>
  <rect x="145" y="155" width="150" height="10" fill="#15202e" rx="2" />
  <rect x="145" y="155" width="103" height="10" fill="#00FF99" filter="url(#neon-glow)" rx="2" />
  <text x="305" y="165" class="text-green">] 69%</text>
  <text x="355" y="165" class="text-dim">(Proxmox, OpenWRT, VPN, Virtualization)</text>

  <!-- CRT Scanline overlay -->
  <rect width="100%" height="200" class="scanline" pointer-events="none" />
</svg>
