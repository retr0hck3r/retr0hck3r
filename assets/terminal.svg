<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1160" width="100%" height="1160">
  <defs>
    <!-- Phosphor Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip Path to prevent vertical lines overflowing terminal bottom -->
    <clipPath id="content-clip">
      <rect x="12" y="42" width="776" height="1106" />
    </clipPath>

    <!-- Scanline Gradient -->
    <linearGradient id="scanline-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FF99" stop-opacity="0" />
      <stop offset="50%" stop-color="#00FF99" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#00FF99" stop-opacity="0" />
    </linearGradient>
  </defs>

  <style>
    @keyframes scanline {
      0% { transform: translateY(-1160px); }
      100% { transform: translateY(1160px); }
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes glitch {
      0%, 92%, 96%, 100% { transform: none; filter: hue-rotate(0deg); }
      94% { transform: translate(-1.5px, 0.5px) skewX(1deg); filter: hue-rotate(60deg); }
      98% { transform: translate(1px, -0.5px); filter: hue-rotate(120deg); }
    }

    /* Typing Animations for CRT Banner Section */
    @keyframes cursor1 {
      0%, 16.67% { opacity: 0; }
      16.68%, 23.33% { opacity: 1; }
      23.34%, 100% { opacity: 0; }
    }
    @keyframes show2 {
      0%, 18.67% { opacity: 0; }
      19.33%, 100% { opacity: 1; }
    }
    @keyframes show3-prompt {
      0%, 23.33% { opacity: 0; }
      24%, 100% { opacity: 1; }
    }
    @keyframes cursor3 {
      0%, 36.67% { opacity: 0; }
      36.68%, 46.67% { opacity: 1; }
      46.68%, 100% { opacity: 0; }
    }
    @keyframes show4 {
      0%, 38.67% { opacity: 0; }
      39.33%, 100% { opacity: 1; }
    }
    @keyframes show5 {
      0%, 40.67% { opacity: 0; }
      41.33%, 100% { opacity: 1; }
    }
    @keyframes show6 {
      0%, 46.67% { opacity: 0; }
      47.33%, 100% { opacity: 1; }
    }
    @keyframes matrix-rain {
      0% { stroke-dashoffset: 1000; }
      100% { stroke-dashoffset: 0; }
    }

    /* Base Styling */
    .bg { fill: #07090e; }
    .text-green { font-family: 'Consolas', 'Courier New', Courier, monospace; font-size: 13.5px; fill: #00FF99; }
    .text-neon { font-family: 'Consolas', 'Courier New', Courier, monospace; font-size: 13.5px; fill: #00FF99; filter: url(#neon-glow); }
    .text-dim { font-family: 'Consolas', 'Courier New', Courier, monospace; font-size: 13.5px; fill: #008855; }
    .text-sub { font-family: 'Consolas', 'Courier New', Courier, monospace; font-size: 13px; fill: #00FF99; opacity: 0.7; }
    .text-error { font-family: 'Consolas', 'Courier New', Courier, monospace; font-size: 13.5px; fill: #ff3366; }
    .text-bold { font-weight: bold; }
    .text-header-large { font-family: 'Consolas', 'Courier New', Courier, monospace; font-size: 26px; font-weight: bold; fill: #00FF99; filter: url(#neon-glow); animation: glitch 7s infinite; }
    
    .border-line { stroke: #00FF99; stroke-width: 1.5; stroke-opacity: 0.25; }
    .window-dot { stroke: #00FF99; stroke-width: 1.5; fill: none; opacity: 0.5; }
    .window-dot-filled { fill: #00FF99; opacity: 0.8; }
    .status-light { fill: #00FF99; filter: url(#neon-glow); animation: blink 1.5s infinite; }
    .scanline { fill: url(#scanline-grad); animation: scanline 8s linear infinite; }
    .mask { fill: #07090e; }
    .cursor-blink { animation: blink 1s infinite; }

    /* Animation mappings */
    .c-cursor-1 { animation: cursor1 15s infinite; }
    .c-line-2 { animation: show2 15s infinite; }
    .c-line-3-prompt { animation: show3-prompt 15s infinite; }
    .c-cursor-3 { animation: cursor3 15s infinite; }
    .c-line-4 { animation: show4 15s infinite; }
    .c-line-5 { animation: show5 15s infinite; }
    .c-line-6 { animation: show6 15s infinite; }

    /* Matrix rain lines */
    .rain { stroke: #00FF99; stroke-width: 1.5; stroke-dasharray: 120 400; stroke-opacity: 0.12; animation: matrix-rain 18s linear infinite; }
    .rain-fast { stroke-width: 2; stroke-opacity: 0.20; animation-duration: 10s; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />

  <!-- Matrix Code Rain (Clipped to prevent overflow) -->
  <line x1="620" y1="0" x2="620" y2="1160" class="rain" clip-path="url(#content-clip)" />
  <line x1="680" y1="0" x2="680" y2="1160" class="rain rain-fast" clip-path="url(#content-clip)" />
  <line x1="740" y1="0" x2="740" y2="1160" class="rain" clip-path="url(#content-clip)" />

  <!-- Terminal Border Window frame (Fully Closed) -->
  <path d="M 10,10 L 790,10 L 790,1150 L 10,1150 Z" fill="none" class="border-line" />
  <path d="M 10,40 L 790,40" class="border-line" />

  <!-- Terminal Window Controls -->
  <circle cx="30" cy="25" r="5" class="window-dot-filled" />
  <circle cx="48" cy="25" r="5" class="window-dot" />
  <circle cx="66" cy="25" r="5" class="window-dot" />
  
  <text x="400" y="29" text-anchor="middle" class="text-sub">session: ssh retr0@white-server</text>
  
  <!-- Status Online Indicator -->
  <circle cx="750" cy="25" r="4.5" class="status-light" />
  <text x="738" y="29" text-anchor="end" class="text-sub">SECURE CONNECTION</text>

  <!-- ================= HEADER SECTION ================= -->
  <text x="30" y="75" class="text-header-large">_> retr0hck3r</text>
  <text x="770" y="73" text-anchor="end" class="text-sub">LOC: 127.0.0.1 // PORT: 22</text>
  <path d="M 10,95 L 790,95" class="border-line" stroke-opacity="0.15" />

  <!-- ================= SYSTEM STATUS SECTION ================= -->
  <!-- Uptime Command -->
  <text x="30" y="125" class="text-dim">retr0@white-server:~$ uptime</text>
  <!-- START_UPTIME -->
  <text x="30" y="145" class="text-green"> 14:41:43 up 59 days, 02:41,  1 user,  load average: 0.09, 0.17, 0.36</text>
  <!-- END_UPTIME -->

  <!-- Load Command -->
  <text x="30" y="175" class="text-dim">retr0@white-server:~$ systemctl status system-load.service</text>
  <text x="30" y="195" class="text-green">● system-load.service - Resource Monitor (running)</text>
  <!-- START_SYSTEM_LOAD -->
  <text x="30" y="215" class="text-green">cpu_load: [</text>
  <rect x="110" y="205" width="150" height="10" fill="#15202e" rx="2" />
  <rect x="110" y="205" width="103" height="10" fill="#00FF99" filter="url(#neon-glow)" rx="2" />
  <text x="270" y="215" class="text-green">] 69%</text>
  <text x="30" y="235" class="text-green">ram_load: [</text>
  <rect x="110" y="225" width="150" height="10" fill="#15202e" rx="2" />
  <rect x="110" y="225" width="82" height="10" fill="#00FF99" filter="url(#neon-glow)" rx="2" />
  <text x="270" y="235" class="text-green">] 55%</text>
  <!-- END_SYSTEM_LOAD -->

  <!-- Operations Command -->
  <text x="30" y="265" class="text-dim">retr0@white-server:~$ cat /var/log/active_ops.log</text>
  <!-- START_OPS -->
  <text x="30" y="285" class="text-dim">PID_8043: subdomain-scanner-go [85%] (optimizing_concurrency)</text>
  <text x="30" y="300" class="text-dim">PID_2210: preparation-osep-cert [50%] (active_study)</text>
  <text x="30" y="315" class="text-dim">PID_1337: ctf-competition-engagement [running] (solving_reverse_pwn)</text>
  <!-- END_OPS -->
  
  <path d="M 10,335 L 790,335" class="border-line" stroke-opacity="0.15" />

  <!-- ================= TECHNICAL SKILLS SECTION ================= -->
  <text x="30" y="365" class="text-dim">retr0@white-server:~$ cat /sys/devices/system/skills.status</text>
  
  <!-- Defensive -->
  <text x="30" y="390" class="text-green text-neon" style="font-weight: bold;">DEFENSIVE</text>
  <text x="130" y="390" class="text-green">[</text>
  <rect x="145" y="380" width="150" height="10" fill="#15202e" rx="2" />
  <rect x="145" y="380" width="129" height="10" fill="#00FF99" filter="url(#neon-glow)" rx="2" />
  <text x="305" y="390" class="text-green">] 86%</text>
  <text x="355" y="390" class="text-dim">(Astra Linux SE, Dallas Lock, SNS, Wireshark)</text>

  <!-- Offensive -->
  <text x="30" y="415" class="text-green text-neon" style="font-weight: bold;">OFFENSIVE</text>
  <text x="130" y="415" class="text-green">[</text>
  <rect x="145" y="405" width="150" height="10" fill="#15202e" rx="2" />
  <rect x="145" y="405" width="63" height="10" fill="#00FF99" filter="url(#neon-glow)" rx="2" />
  <text x="305" y="415" class="text-green">] 42%</text>
  <text x="355" y="415" class="text-dim">(BurpSuite, Nmap, CTF)</text>

  <!-- Automation -->
  <text x="30" y="440" class="text-green text-neon" style="font-weight: bold;">AUTOMATION</text>
  <text x="130" y="440" class="text-green">[</text>
  <rect x="145" y="430" width="150" height="10" fill="#15202e" rx="2" />
  <rect x="145" y="430" width="111" height="10" fill="#00FF99" filter="url(#neon-glow)" rx="2" />
  <text x="305" y="440" class="text-green">] 74%</text>
  <text x="355" y="440" class="text-dim">(Python, Bash, Docker, Git)</text>

  <!-- Foundation -->
  <text x="30" y="465" class="text-green text-neon" style="font-weight: bold;">FOUNDATION</text>
  <text x="130" y="465" class="text-green">[</text>
  <rect x="145" y="455" width="150" height="10" fill="#15202e" rx="2" />
  <rect x="145" y="455" width="103" height="10" fill="#00FF99" filter="url(#neon-glow)" rx="2" />
  <text x="305" y="465" class="text-green">] 69%</text>
  <text x="355" y="465" class="text-dim">(Proxmox, OpenWRT, VPN, Virtualization)</text>

  <path d="M 10,490 L 790,490" class="border-line" stroke-opacity="0.15" />

  <!-- ================= INTERACTIVE ANIMATION SECTION ================= -->
  <!-- Line 1: Command 1 (Prompt immediate, command typing) -->
  <g>
    <text x="30" y="520" class="text-green text-bold">retr0@white-server:~$</text>
    <text x="205" y="520" class="text-green">ssh reality</text>
    <!-- Typing mask -->
    <rect x="205" y="505" width="110" height="20" class="mask">
      <animate attributeName="x" dur="15s" repeatCount="indefinite" values="205; 205; 315; 315" keyTimes="0; 0.0667; 0.1667; 1" />
      <animate attributeName="width" dur="15s" repeatCount="indefinite" values="110; 110; 0; 0" keyTimes="0; 0.0667; 0.1667; 1" />
    </rect>
    <!-- Blinking Cursor -->
    <text x="317" y="520" class="text-green cursor-blink c-cursor-1">█</text>
  </g>

  <!-- Line 2: Connection refused output -->
  <g class="c-line-2">
    <text x="30" y="545" class="text-error">ssh: connect to host reality port 22: Connection refused</text>
  </g>

  <!-- Line 3: Command 2 (Prompt appears, command typing) -->
  <g class="c-line-3-prompt">
    <text x="30" y="580" class="text-green text-bold">retr0@white-server:~$</text>
    <text x="205" y="580" class="text-green">systemctl status motivation.service</text>
    <!-- Typing mask -->
    <rect x="205" y="565" width="280" height="20" class="mask">
      <animate attributeName="x" dur="15s" repeatCount="indefinite" values="205; 205; 205; 485; 485" keyTimes="0; 0.2333; 0.2667; 0.3667; 1" />
      <animate attributeName="width" dur="15s" repeatCount="indefinite" values="280; 280; 280; 0; 0" keyTimes="0; 0.2333; 0.2667; 0.3667; 1" />
    </rect>
    <!-- Blinking Cursor -->
    <text x="487" y="580" class="text-green cursor-blink c-cursor-3">█</text>
  </g>

  <!-- Line 4: Systemd Service Loaded -->
  <g class="c-line-4">
    <text x="30" y="605" class="text-dim">● motivation.service - Motivation Daemon</text>
  </g>

  <!-- Line 5: Systemd Service Failed -->
  <g class="c-line-5">
    <text x="30" y="630" class="text-error">     Active: failed (Result: core-dump) since Wed 2026-07-01 18:00:21 MSK</text>
  </g>

  <!-- Line 6: Next prompt waiting -->
  <g class="c-line-6">
    <text x="30" y="665" class="text-green text-bold">retr0@white-server:~$ <tspan class="cursor-blink">█</tspan></text>
  </g>

  <path d="M 10,685 L 790,685" class="border-line" stroke-opacity="0.15" />

  <!-- ================= DECRYPTED CONTACTS SECTION ================= -->
  <text x="30" y="715" class="text-dim">retr0@white-server:~$ gpg --decrypt contacts.asc.gpg</text>
  <text x="30" y="735" class="text-dim">gpg: Signature made Wed Jul  1 18:00:00 2026 MSK using RSA key FAD1337BEEF</text>
  <text x="30" y="750" class="text-neon">gpg: Good signature from "retr0 &lt;retr0mail.work@gmail.com&gt;"</text>

  <!-- Inner grid border -->
  <path d="M 30,770 L 770,770 L 770,895 L 30,895 Z" fill="none" class="border-line" stroke-opacity="0.15" />
  
  <text x="50" y="795" class="text-neon" style="font-weight: bold;">[ DECRYPTED COMMUNICATIONS ]</text>
  
  <!-- Telegram details -->
  <text x="50" y="825" class="text-green">TELEGRAM:</text>
  <text x="150" y="825" class="text-green">@retr0_sec</text>
  <text x="340" y="825" class="text-dim">(t.me/retr0_sec)</text>

  <!-- Keybase details -->
  <text x="50" y="850" class="text-green">KEYBASE:</text>
  <text x="150" y="850" class="text-green">NULL</text>
  <text x="340" y="850" class="text-dim">(NULL)</text>

  <!-- Email details -->
  <text x="50" y="875" class="text-green">EMAIL:</text>
  <text x="150" y="875" class="text-green">retr0mail.work@gmail.com</text>
  <text x="340" y="875" class="text-dim">(secured via GPG)</text>

  <!-- GPG / PGP Public Key Section -->
  <path d="M 490,780 L 490,885" class="border-line" stroke-opacity="0.15" />
  <text x="500" y="805" class="text-green">GPG KEY BLOCK (ID: FAD1337BEEF)</text>
  <text x="500" y="825" class="text-dim">-----BEGIN PGP PUBLIC KEY BLOCK-----</text>
  <text x="500" y="840" class="text-dim">Version: OpenPGP.js v4.10.2</text>
  <text x="500" y="855" class="text-dim">mQINBF2Wv...</text>
  <text x="500" y="870" class="text-dim">-----END PGP PUBLIC KEY BLOCK-----</text>

  <path d="M 10,915 L 790,915" class="border-line" stroke-opacity="0.15" />

  <!-- ================= COWSAY SECTION ================= -->
  <text x="30" y="945" class="text-dim">retr0@white-server:~$ fortune | cowsay</text>
  <g class="text-green">
    <text x="230" y="970" xml:space="preserve"> _________________________________________</text>
    <text x="230" y="985" xml:space="preserve">/ Security is not a product, but a        \</text>
    <text x="230" y="1000" xml:space="preserve">\ process. - Bruce Schneier               /</text>
    <text x="230" y="1015" xml:space="preserve"> -----------------------------------------</text>
    <text x="230" y="1030" xml:space="preserve">        \   ^__^</text>
    <text x="230" y="1045" xml:space="preserve">         \  (oo)\_______</text>
    <text x="230" y="1060" xml:space="preserve">            (__)\       )\/\</text>
    <text x="230" y="1075" xml:space="preserve">                ||----w |</text>
    <text x="230" y="1090" xml:space="preserve">                ||     ||</text>
  </g>

  <path d="M 10,1110 L 790,1110" class="border-line" stroke-opacity="0.15" />

  <!-- ================= FINAL PROMPT ================= -->
  <text x="30" y="1135" class="text-green text-bold">retr0@white-server:~$ <tspan class="cursor-blink">█</tspan></text>

  <!-- CRT Scanline overlay -->
  <rect width="100%" height="1160" class="scanline" pointer-events="none" />
</svg>
