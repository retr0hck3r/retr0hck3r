<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 175" width="100%" height="175">
  <defs>
    <!-- Phosphor Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    .bg { fill: #07090e; }
    .text-green { font-family: 'Consolas', 'Courier New', monospace; font-size: 11.5px; fill: #00FF99; }
    .text-neon { font-family: 'Consolas', 'Courier New', monospace; font-size: 11.5px; fill: #00FF99; filter: url(#neon-glow); }
    .text-sub { font-family: 'Consolas', 'Courier New', monospace; font-size: 11.5px; fill: #00FF99; opacity: 0.7; }
    .border-line { stroke: #00FF99; stroke-width: 1.2; stroke-opacity: 0.25; }
    .window-dot { stroke: #00FF99; stroke-width: 1.2; fill: none; opacity: 0.5; }
    .window-dot-filled { fill: #00FF99; opacity: 0.8; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />
  
  <!-- Terminal Border Window frame (Fully Closed) -->
  <path d="M 8,8 L 442,8 L 442,165 L 8,165 Z" fill="none" class="border-line" />
  <path d="M 8,30 L 442,30" class="border-line" />

  <!-- Terminal Window Controls -->
  <circle cx="20" cy="19" r="3.5" class="window-dot-filled" />
  <circle cx="32" cy="19" r="3.5" class="window-dot" />
  <circle cx="44" cy="19" r="3.5" class="window-dot" />
  
  <text x="225" y="22" text-anchor="middle" class="text-sub" style="font-size: 10px;">session: fortune | cowsay</text>

  <!-- Cowsay terminal output (Strict spacing preserved via xml:space) -->
  <text x="25" y="48" class="text-green" xml:space="preserve"> _________________________________________
/ Security is not a product, but a        \
\ process. - Bruce Schneier               /
 -----------------------------------------
        \   ^__^
         \  (oo)\_______
            (__)\       )\/\
                ||----w |
                ||     ||</text>
</svg>
