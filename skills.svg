<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="100%" height="140">
  <defs>
    <!-- Phosphor Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanline Gradient -->
    <linearGradient id="scanline-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FF99" stop-opacity="0" />
      <stop offset="50%" stop-color="#00FF99" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#00FF99" stop-opacity="0" />
    </linearGradient>
  </defs>
  <style>
    @keyframes scanline {
      0% { transform: translateY(-140px); }
      100% { transform: translateY(140px); }
    }
    .bg { fill: #07090e; }
    .text-neon { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #00FF99; filter: url(#neon-glow); }
    .text-green { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #00FF99; }
    .text-dim { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #008855; }
    .border-line { stroke: #00FF99; stroke-width: 1.5; stroke-opacity: 0.25; }
    .scanline { fill: url(#scanline-grad); animation: scanline 8s linear infinite; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />
  
  <!-- Side Borders only (Connects top and bottom SVGs) -->
  <line x1="10" y1="0" x2="10" y2="140" class="border-line" />
  <line x1="790" y1="0" x2="790" y2="140" class="border-line" />

  <!-- Skills Command -->
  <text x="30" y="25" class="text-dim">retr0@white-server:~$ cat /sys/devices/system/skills.status</text>
  
  <!-- Defensive (Primary) -->
  <text x="30" y="50" class="text-green text-neon">DEFENSIVE</text>
  <text x="130" y="50" class="text-green">[██████████████████░░] 90%</text>
  <text x="370" y="50" class="text-dim">(Suricata, Wireshark, SIEM, Containers Hardening)</text>

  <!-- Offensive (Secondary) -->
  <text x="30" y="72" class="text-green text-neon">OFFENSIVE</text>
  <text x="130" y="72" class="text-green">[████████████░░░░░░░░] 60%</text>
  <text x="370" y="72" class="text-dim">(BurpSuite, Nmap, Exploits, Web PenTesting)</text>

  <!-- Automation -->
  <text x="30" y="94" class="text-green text-neon">AUTOMATION</text>
  <text x="130" y="94" class="text-green">[████████████████░░░░] 80%</text>
  <text x="370" y="94" class="text-dim">(Python, Go, Bash Scripting, Docker, Git)</text>

  <!-- Research -->
  <text x="30" y="116" class="text-green text-neon">RESEARCH</text>
  <text x="130" y="116" class="text-green">[██████████████░░░░░░] 70%</text>
  <text x="370" y="116" class="text-dim">(CTF Reverse/Pwn, Web Security Research)</text>

  <!-- CRT Scanline overlay -->
  <rect width="100%" height="140" class="scanline" pointer-events="none" />
</svg>
