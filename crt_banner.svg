<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <!-- Phosphor Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip Path to prevent vertical lines overflowing terminal bottom -->
    <clipPath id="content-clip">
      <rect x="11" y="0" width="778" height="189" />
    </clipPath>

    <!-- Scanline Gradient -->
    <linearGradient id="scanline-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FF99" stop-opacity="0" />
      <stop offset="50%" stop-color="#00FF99" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#00FF99" stop-opacity="0" />
    </linearGradient>
  </defs>

  <style>
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes scanline {
      0% { transform: translateY(-200px); }
      100% { transform: translateY(200px); }
    }
    
    /* Left-to-Right typing using scaleX with right-aligned transform-origins */
    @keyframes type1 {
      0%, 6.67% { transform: scaleX(1); } /* 0s - 1s (delay) */
      16.67%, 100% { transform: scaleX(0); } /* 2.5s - 15s (done) */
    }
    @keyframes type3 {
      0%, 26.67% { transform: scaleX(1); } /* 0s - 4.0s (delay) */
      36.67%, 100% { transform: scaleX(0); } /* 5.5s (done) */
    }

    @keyframes cursor1 {
      0%, 16.67% { opacity: 0; }
      16.68%, 23.33% { opacity: 1; }
      23.34%, 100% { opacity: 0; }
    }
    @keyframes show2 {
      0%, 18.67% { opacity: 0; }
      19.33%, 100% { opacity: 1; }
    }
    @keyframes show3-prompt {
      0%, 23.33% { opacity: 0; }
      24%, 100% { opacity: 1; }
    }
    @keyframes cursor3 {
      0%, 36.67% { opacity: 0; }
      36.68%, 46.67% { opacity: 1; }
      46.68%, 100% { opacity: 0; }
    }
    @keyframes show4 {
      0%, 38.67% { opacity: 0; }
      39.33%, 100% { opacity: 1; }
    }
    @keyframes show5 {
      0%, 40.67% { opacity: 0; }
      41.33%, 100% { opacity: 1; }
    }
    @keyframes show6 {
      0%, 46.67% { opacity: 0; }
      47.33%, 100% { opacity: 1; }
    }
    @keyframes matrix-rain {
      0% { stroke-dashoffset: 1000; }
      100% { stroke-dashoffset: 0; }
    }

    /* Base Styling */
    .bg { fill: #07090e; }
    .text-green { font-family: 'Consolas', 'Courier New', Courier, monospace; font-size: 14px; fill: #00FF99; filter: url(#glow); }
    .text-dim { font-family: 'Consolas', 'Courier New', Courier, monospace; font-size: 14px; fill: #008855; }
    .text-bold { font-weight: bold; }
    .text-error { fill: #ff3366; }
    
    .mask { fill: #07090e; }
    .cursor-blink { animation: blink 1s infinite; }
    
    /* Animation mappings */
    .c-mask-1 { transform-origin: 310px 0; animation: type1 15s infinite; }
    .c-cursor-1 { animation: cursor1 15s infinite; }
    .c-line-2 { animation: show2 15s infinite; }
    .c-line-3-prompt { animation: show3-prompt 15s infinite; }
    .c-mask-3 { transform-origin: 480px 0; animation: type3 15s infinite; }
    .c-cursor-3 { animation: cursor3 15s infinite; }
    .c-line-4 { animation: show4 15s infinite; }
    .c-line-5 { animation: show5 15s infinite; }
    .c-line-6 { animation: show6 15s infinite; }

    .scanline { fill: url(#scanline-grad); animation: scanline 8s linear infinite; }
    
    /* Matrix rain lines */
    .rain { stroke: #00FF99; stroke-width: 1.5; stroke-dasharray: 120 400; stroke-opacity: 0.12; animation: matrix-rain 18s linear infinite; }
    .rain-fast { stroke-width: 2; stroke-opacity: 0.20; animation-duration: 10s; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />

  <!-- Matrix Code Rain (Clipped to prevent overflow) -->
  <line x1="620" y1="0" x2="620" y2="200" class="rain" clip-path="url(#content-clip)" />
  <line x1="680" y1="0" x2="680" y2="200" class="rain rain-fast" clip-path="url(#content-clip)" />
  <line x1="740" y1="0" x2="740" y2="200" class="rain" clip-path="url(#content-clip)" />

  <!-- Terminal Borders (Side and bottom closed) -->
  <path d="M 10,0 L 10,190 L 790,190 L 790,0" fill="none" class="border-line" />

  <!-- Line 1: Command 1 (Prompt immediate, command typing) -->
  <g>
    <text x="25" y="25" class="text-green text-bold">retr0@white-server:~$</text>
    <text x="200" y="25" class="text-green">ssh reality</text>
    <!-- Typing mask -->
    <rect x="200" y="10" width="110" height="20" class="mask c-mask-1" />
    <!-- Blinking Cursor -->
    <text x="312" y="25" class="text-green cursor-blink c-cursor-1">█</text>
  </g>

  <!-- Line 2: Connection refused output -->
  <g class="c-line-2">
    <text x="25" y="50" class="text-dim text-error">ssh: connect to host reality port 22: Connection refused</text>
  </g>

  <!-- Line 3: Command 2 (Prompt appears, command typing) -->
  <g class="c-line-3-prompt">
    <text x="25" y="85" class="text-green text-bold">retr0@white-server:~$</text>
    <text x="200" y="85" class="text-green">systemctl status motivation.service</text>
    <!-- Typing mask -->
    <rect x="200" y="70" width="280" height="20" class="mask c-mask-3" />
    <!-- Blinking Cursor -->
    <text x="482" y="85" class="text-green cursor-blink c-cursor-3">█</text>
  </g>

  <!-- Line 4: Systemd Service Loaded -->
  <g class="c-line-4">
    <text x="25" y="110" class="text-dim">● motivation.service - Motivation Daemon</text>
  </g>

  <!-- Line 5: Systemd Service Failed -->
  <g class="c-line-5">
    <text x="25" y="135" class="text-error">     Active: failed (Result: core-dump) since Wed 2026-07-01 18:00:21 MSK</text>
  </g>

  <!-- Line 6: Next prompt waiting -->
  <g class="c-line-6">
    <text x="25" y="170" class="text-green text-bold">retr0@white-server:~$</text>
    <text x="200" y="170" class="text-green cursor-blink">█</text>
  </g>

  <!-- CRT Scanline overlay -->
  <rect width="100%" height="200" class="scanline" pointer-events="none" />
</svg>
