<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="250">
  <defs>
    <!-- Phosphor Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip Path to prevent vertical lines overflowing terminal bottom -->
    <clipPath id="content-clip">
      <rect x="12" y="42" width="776" height="196" />
    </clipPath>

    <!-- Scanline Gradient -->
    <linearGradient id="scanline-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FF99" stop-opacity="0" />
      <stop offset="50%" stop-color="#00FF99" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#00FF99" stop-opacity="0" />
    </linearGradient>
  </defs>

  <style>
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes scanline {
      0% { transform: translateY(-250px); }
      100% { transform: translateY(250px); }
    }

    @keyframes cursor1 {
      0%, 16.67% { opacity: 0; }
      16.68%, 23.33% { opacity: 1; }
      23.34%, 100% { opacity: 0; }
    }
    @keyframes show2 {
      0%, 18.67% { opacity: 0; }
      19.33%, 100% { opacity: 1; }
    }
    @keyframes show3-prompt {
      0%, 23.33% { opacity: 0; }
      24%, 100% { opacity: 1; }
    }
    @keyframes cursor3 {
      0%, 36.67% { opacity: 0; }
      36.68%, 46.67% { opacity: 1; }
      46.68%, 100% { opacity: 0; }
    }
    @keyframes show4 {
      0%, 38.67% { opacity: 0; }
      39.33%, 100% { opacity: 1; }
    }
    @keyframes show5 {
      0%, 40.67% { opacity: 0; }
      41.33%, 100% { opacity: 1; }
    }
    @keyframes show6 {
      0%, 46.67% { opacity: 0; }
      47.33%, 100% { opacity: 1; }
    }
    @keyframes matrix-rain {
      0% { stroke-dashoffset: 1000; }
      100% { stroke-dashoffset: 0; }
    }

    /* Base Styling */
    .bg { fill: #07090e; }
    .text-green { font-family: 'Consolas', 'Courier New', Courier, monospace; font-size: 14px; fill: #00FF99; filter: url(#glow); }
    .text-dim { font-family: 'Consolas', 'Courier New', Courier, monospace; font-size: 14px; fill: #008855; }
    .text-sub { font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; fill: #00FF99; opacity: 0.7; }
    .text-bold { font-weight: bold; }
    .text-error { fill: #ff3366; }
    
    .mask { fill: #07090e; }
    .cursor-blink { animation: blink 1s infinite; }
    
    /* Animation mappings */
    .c-cursor-1 { animation: cursor1 15s infinite; }
    .c-line-2 { animation: show2 15s infinite; }
    .c-line-3-prompt { animation: show3-prompt 15s infinite; }
    .c-cursor-3 { animation: cursor3 15s infinite; }
    .c-line-4 { animation: show4 15s infinite; }
    .c-line-5 { animation: show5 15s infinite; }
    .c-line-6 { animation: show6 15s infinite; }

    .scanline { fill: url(#scanline-grad); animation: scanline 8s linear infinite; }
    .border-line { stroke: #00FF99; stroke-width: 1.5; stroke-opacity: 0.25; }
    .window-dot { stroke: #00FF99; stroke-width: 1.5; fill: none; opacity: 0.5; }
    .window-dot-filled { fill: #00FF99; opacity: 0.8; }
    
    /* Matrix rain lines */
    .rain { stroke: #00FF99; stroke-width: 1.5; stroke-dasharray: 120 400; stroke-opacity: 0.12; animation: matrix-rain 18s linear infinite; }
    .rain-fast { stroke-width: 2; stroke-opacity: 0.20; animation-duration: 10s; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />

  <!-- Matrix Code Rain (Clipped to prevent overflow) -->
  <line x1="620" y1="0" x2="620" y2="250" class="rain" clip-path="url(#content-clip)" />
  <line x1="680" y1="0" x2="680" y2="250" class="rain rain-fast" clip-path="url(#content-clip)" />
  <line x1="740" y1="0" x2="740" y2="250" class="rain" clip-path="url(#content-clip)" />

  <!-- Terminal Borders (Fully Closed) -->
  <path d="M 10,10 L 790,10 L 790,240 L 10,240 Z" fill="none" class="border-line" />
  <path d="M 10,40 L 790,40" class="border-line" />

  <!-- Window Controls -->
  <circle cx="30" cy="25" r="5" class="window-dot-filled" />
  <circle cx="48" cy="25" r="5" class="window-dot" />
  <circle cx="66" cy="25" r="5" class="window-dot" />
  
  <text x="400" y="29" text-anchor="middle" class="text-sub">session: ssh retr0@white-server</text>

  <!-- Line 1: Command 1 (Prompt immediate, command typing) -->
  <g>
    <text x="25" y="65" class="text-green text-bold">retr0@white-server:~$</text>
    <text x="200" y="65" class="text-green">ssh reality</text>
    <!-- Typing mask: Animates coordinates x and width to reveal left-to-right -->
    <rect x="200" y="50" width="110" height="20" class="mask">
      <animate attributeName="x" dur="15s" repeatCount="indefinite" values="200; 200; 310; 310" keyTimes="0; 0.0667; 0.1667; 1" />
      <animate attributeName="width" dur="15s" repeatCount="indefinite" values="110; 110; 0; 0" keyTimes="0; 0.0667; 0.1667; 1" />
    </rect>
    <!-- Blinking Cursor -->
    <text x="312" y="65" class="text-green cursor-blink c-cursor-1">█</text>
  </g>

  <!-- Line 2: Connection refused output -->
  <g class="c-line-2">
    <text x="25" y="90" class="text-dim text-error">ssh: connect to host reality port 22: Connection refused</text>
  </g>

  <!-- Line 3: Command 2 (Prompt appears, command typing) -->
  <g class="c-line-3-prompt">
    <text x="25" y="125" class="text-green text-bold">retr0@white-server:~$</text>
    <text x="200" y="125" class="text-green">systemctl status motivation.service</text>
    <!-- Typing mask: Animates coordinates x and width to reveal left-to-right -->
    <rect x="200" y="110" width="280" height="20" class="mask">
      <animate attributeName="x" dur="15s" repeatCount="indefinite" values="200; 200; 200; 480; 480" keyTimes="0; 0.2333; 0.2667; 0.3667; 1" />
      <animate attributeName="width" dur="15s" repeatCount="indefinite" values="280; 280; 280; 0; 0" keyTimes="0; 0.2333; 0.2667; 0.3667; 1" />
    </rect>
    <!-- Blinking Cursor -->
    <text x="482" y="125" class="text-green cursor-blink c-cursor-3">█</text>
  </g>

  <!-- Line 4: Systemd Service Loaded -->
  <g class="c-line-4">
    <text x="25" y="150" class="text-dim">● motivation.service - Motivation Daemon</text>
  </g>

  <!-- Line 5: Systemd Service Failed -->
  <g class="c-line-5">
    <text x="25" y="175" class="text-error">     Active: failed (Result: core-dump) since Wed 2026-07-01 18:00:21 MSK</text>
  </g>

  <!-- Line 6: Next prompt waiting -->
  <g class="c-line-6">
    <text x="25" y="210" class="text-green text-bold">retr0@white-server:~$</text>
    <text x="200" y="210" class="text-green cursor-blink">█</text>
  </g>

  <!-- CRT Scanline overlay -->
  <rect width="100%" height="250" class="scanline" pointer-events="none" />
</svg>
