<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="250">
  <defs>
    <!-- Phosphor Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- CRT Grid Pattern -->
    <pattern id="grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 0 8" fill="none" stroke="#00FF99" stroke-width="0.5" stroke-opacity="0.04" />
    </pattern>

    <!-- Scanline Gradient -->
    <linearGradient id="scanline-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FF99" stop-opacity="0" />
      <stop offset="50%" stop-color="#00FF99" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#00FF99" stop-opacity="0" />
    </linearGradient>
  </defs>

  <style>
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes scanline {
      0% { transform: translateY(-250px); }
      100% { transform: translateY(250px); }
    }
    
    /* Timing for 15 second loop */
    
    /* Line 1 Typing */
    @keyframes type1 {
      0%, 6.67% { width: 110px; } /* 0s - 1s (delay) */
      16.67%, 100% { width: 0px; } /* 2.5s - 15s (done) */
    }
    /* Cursor 1 blinking */
    @keyframes cursor1 {
      0%, 16.67% { opacity: 0; } /* hidden until 2.5s */
      16.68%, 23.33% { opacity: 1; } /* blinking from 2.5s to 3.5s */
      23.34%, 100% { opacity: 0; } /* hidden after 3.5s */
    }

    /* Line 2 Opacity */
    @keyframes show2 {
      0%, 18.67% { opacity: 0; } /* hidden until 2.8s */
      19.33%, 100% { opacity: 1; } /* visible from 2.9s onwards */
    }

    /* Line 3 Prompt Opacity */
    @keyframes show3-prompt {
      0%, 23.33% { opacity: 0; } /* hidden until 3.5s */
      24%, 100% { opacity: 1; }
    }
    /* Line 3 Command Typing */
    @keyframes type3 {
      0%, 26.67% { width: 280px; } /* 0s - 4.0s (delay) */
      36.67%, 100% { width: 0px; } /* 5.5s (done) */
    }
    /* Cursor 3 blinking */
    @keyframes cursor3 {
      0%, 36.67% { opacity: 0; } /* hidden until 5.5s */
      36.68%, 46.67% { opacity: 1; } /* blinking from 5.5s to 7.0s */
      46.68%, 100% { opacity: 0; } /* hidden after 7.0s */
    }

    /* Line 4 Opacity */
    @keyframes show4 {
      0%, 38.67% { opacity: 0; } /* hidden until 5.8s */
      39.33%, 100% { opacity: 1; }
    }

    /* Line 5 Opacity */
    @keyframes show5 {
      0%, 40.67% { opacity: 0; } /* hidden until 6.1s */
      41.33%, 100% { opacity: 1; }
    }

    /* Line 6 Prompt and Cursor Opacity */
    @keyframes show6 {
      0%, 46.67% { opacity: 0; } /* hidden until 7.0s */
      47.33%, 100% { opacity: 1; }
    }

    /* Matrix Rain columns */
    @keyframes matrix-rain {
      0% { stroke-dashoffset: 1000; }
      100% { stroke-dashoffset: 0; }
    }

    /* Glitch Title Animation */
    @keyframes glitch {
      0%, 90%, 94%, 98%, 100% { transform: none; filter: hue-rotate(0deg); }
      92% { transform: translate(-2px, 1px) skewX(2deg); filter: hue-rotate(90deg); }
      96% { transform: translate(1px, -1px) skewY(-1deg); filter: hue-rotate(180deg); }
    }

    /* Base Styling */
    .bg { fill: #07090e; }
    .text-green { font-family: 'Consolas', 'Courier New', Courier, monospace; font-size: 14px; fill: #00FF99; filter: url(#glow); }
    .text-dim { font-family: 'Consolas', 'Courier New', Courier, monospace; font-size: 14px; fill: #008855; }
    .text-bold { font-weight: bold; }
    .text-error { fill: #ff3366; }
    
    .mask { fill: #07090e; }
    .cursor-blink { animation: blink 1s infinite; }
    
    /* Class timings */
    .c-mask-1 { animation: type1 15s infinite steps(15); }
    .c-cursor-1 { animation: cursor1 15s infinite; }
    .c-line-2 { animation: show2 15s infinite; }
    .c-line-3-prompt { animation: show3-prompt 15s infinite; }
    .c-mask-3 { animation: type3 15s infinite steps(25); }
    .c-cursor-3 { animation: cursor3 15s infinite; }
    .c-line-4 { animation: show4 15s infinite; }
    .c-line-5 { animation: show5 15s infinite; }
    .c-line-6 { animation: show6 15s infinite; }

    .hud-title { font-family: 'Consolas', 'Courier New', Courier, monospace; font-size: 12px; fill: #00FF99; opacity: 0.8; animation: glitch 6s infinite; }
    .scanline { fill: url(#scanline-grad); animation: scanline 8s linear infinite; }
    
    /* Matrix rain lines */
    .rain { stroke: #00FF99; stroke-width: 1.5; stroke-dasharray: 120 400; stroke-opacity: 0.15; animation: matrix-rain 18s linear infinite; }
    .rain-fast { stroke-width: 2; stroke-opacity: 0.25; animation-duration: 10s; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />

  <!-- Grid overlay -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Matrix Code Rain (Side decorative) -->
  <line x1="620" y1="0" x2="620" y2="250" class="rain" />
  <line x1="680" y1="0" x2="680" y2="250" class="rain rain-fast" />
  <line x1="740" y1="0" x2="740" y2="250" class="rain" />

  <!-- Terminal Frame / HUD -->
  <path d="M 10,10 L 790,10 L 790,240 L 10,240 Z" fill="none" stroke="#00FF99" stroke-width="1.5" stroke-opacity="0.25" />
  <text x="25" y="28" class="hud-title">[ SYSTEM: ONLINE ]</text>
  <text x="640" y="28" class="hud-title">[ NODE: retr0node ]</text>

  <!-- Line 1: Command 1 (Prompt immediate, command typing) -->
  <g>
    <text x="25" y="65" class="text-green text-bold">retr0@white-server:~$</text>
    <text x="200" y="65" class="text-green">ssh reality</text>
    <!-- Typing mask -->
    <rect x="200" y="50" width="110" height="20" class="mask c-mask-1" />
    <!-- Blinking Cursor -->
    <text x="312" y="65" class="text-green cursor-blink c-cursor-1">█</text>
  </g>

  <!-- Line 2: Connection refused output -->
  <g class="c-line-2">
    <text x="25" y="90" class="text-dim text-error">ssh: connect to host reality port 22: Connection refused</text>
  </g>

  <!-- Line 3: Command 2 (Prompt appears, command typing) -->
  <g class="c-line-3-prompt">
    <text x="25" y="125" class="text-green text-bold">retr0@white-server:~$</text>
    <text x="200" y="125" class="text-green">systemctl status motivation.service</text>
    <!-- Typing mask -->
    <rect x="200" y="110" width="280" height="20" class="mask c-mask-3" />
    <!-- Blinking Cursor -->
    <text x="482" y="125" class="text-green cursor-blink c-cursor-3">█</text>
  </g>

  <!-- Line 4: Systemd Service Loaded -->
  <g class="c-line-4">
    <text x="25" y="150" class="text-dim">● motivation.service - Motivation Daemon</text>
  </g>

  <!-- Line 5: Systemd Service Failed -->
  <g class="c-line-5">
    <text x="25" y="175" class="text-error">     Active: failed (Result: core-dump) since Wed 2026-07-01 18:00:21 MSK</text>
  </g>

  <!-- Line 6: Next prompt waiting -->
  <g class="c-line-6">
    <text x="25" y="210" class="text-green text-bold">retr0@white-server:~$</text>
    <text x="200" y="210" class="text-green cursor-blink">█</text>
  </g>

  <!-- CRT Scanline overlay -->
  <rect width="100%" height="250" class="scanline" pointer-events="none" />
</svg>
