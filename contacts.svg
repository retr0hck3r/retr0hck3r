<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="250">
  <defs>
    <!-- Phosphor Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanline Gradient -->
    <linearGradient id="scanline-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FF99" stop-opacity="0" />
      <stop offset="50%" stop-color="#00FF99" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#00FF99" stop-opacity="0" />
    </linearGradient>
  </defs>
  <style>
    @keyframes scanline {
      0% { transform: translateY(-250px); }
      100% { transform: translateY(250px); }
    }
    .bg { fill: #07090e; }
    .text-green { font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; fill: #00FF99; }
    .text-neon { font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; fill: #00FF99; filter: url(#neon-glow); }
    .text-dim { font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; fill: #008855; }
    .text-sub { font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; fill: #00FF99; opacity: 0.7; }
    
    .window-dot { stroke: #00FF99; stroke-width: 1.5; fill: none; opacity: 0.5; }
    .window-dot-filled { fill: #00FF99; opacity: 0.8; }
    .border-line { stroke: #00FF99; stroke-width: 1.5; stroke-opacity: 0.25; }
    .scanline { fill: url(#scanline-grad); animation: scanline 8s linear infinite; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />
  
  <!-- Terminal Border Window frame (Fully Closed) -->
  <path d="M 10,10 L 790,10 L 790,240 L 10,240 Z" fill="none" class="border-line" />
  <path d="M 10,40 L 790,40" class="border-line" />

  <!-- Terminal Window Controls -->
  <circle cx="30" cy="25" r="5" class="window-dot-filled" />
  <circle cx="48" cy="25" r="5" class="window-dot" />
  <circle cx="66" cy="25" r="5" class="window-dot" />
  
  <text x="400" y="29" text-anchor="middle" class="text-sub">session: gpg --decrypt contacts.asc.gpg</text>

  <!-- GPG Decryption logs -->
  <text x="30" y="65" class="text-dim">gpg: Signature made Wed Jul  1 18:00:00 2026 MSK using RSA key FAD1337BEEF</text>
  <text x="30" y="80" class="text-neon">gpg: Good signature from "retr0 &lt;retr0mail.work@gmail.com&gt;"</text>

  <!-- Decrypted Contacts Grid -->
  <path d="M 30,100 L 770,100 L 770,225 L 30,225 Z" fill="none" class="border-line" stroke-opacity="0.15" />
  
  <text x="50" y="125" class="text-neon" style="font-weight: bold;">[ DECRYPTED COMMUNICATIONS ]</text>
  
  <!-- ================================================================= -->
  <!-- EDIT YOUR CONTACT DATA HERE: Replace the text fields below        -->
  <!-- ================================================================= -->
  
  <!-- Telegram details -->
  <text x="50" y="155" class="text-green">TELEGRAM:</text>
  <text x="150" y="155" class="text-green">@retr0_sec</text>
  <text x="320" y="155" class="text-dim">(t.me/retr0_sec)</text>

  <!-- Keybase details -->
  <text x="50" y="180" class="text-green">KEYBASE:</text>
  <text x="150" y="180" class="text-green">NULL</text>
  <text x="320" y="180" class="text-dim">(NULL)</text>

  <!-- Email details -->
  <text x="50" y="205" class="text-green">EMAIL:</text>
  <text x="150" y="205" class="text-green">retr0mail.work@gmail.com</text>
  <text x="320" y="205" class="text-dim">(secured via GPG)</text>

  <!-- GPG / PGP Public Key Section (Edit lines 63-68 to update your GPG block) -->
  <path d="M 490,110 L 490,215" class="border-line" stroke-opacity="0.15" />
  <text x="500" y="135" class="text-green">GPG KEY BLOCK (ID: FAD1337BEEF)</text>
  <text x="500" y="155" class="text-dim">-----BEGIN PGP PUBLIC KEY BLOCK-----</text>
  <text x="500" y="170" class="text-dim">Version: OpenPGP.js v4.10.2</text>
  <text x="500" y="185" class="text-dim">mQINBF2Wv...</text>
  <text x="500" y="200" class="text-dim">-----END PGP PUBLIC KEY BLOCK-----</text>

  <!-- CRT Scanline overlay -->
  <rect width="100%" height="250" class="scanline" pointer-events="none" />
</svg>
