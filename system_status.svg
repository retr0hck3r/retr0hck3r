<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 230" width="100%" height="230">
  <defs>
    <!-- Phosphor Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanline Gradient -->
    <linearGradient id="scanline-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FF99" stop-opacity="0" />
      <stop offset="50%" stop-color="#00FF99" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#00FF99" stop-opacity="0" />
    </linearGradient>
  </defs>
  <style>
    @keyframes scanline {
      0% { transform: translateY(-230px); }
      100% { transform: translateY(230px); }
    }
    .bg { fill: #07090e; }
    .text-green { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #00FF99; }
    .text-neon { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #00FF99; filter: url(#neon-glow); }
    .text-dim { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #008855; }
    .border-line { stroke: #00FF99; stroke-width: 1.5; stroke-opacity: 0.25; }
    .scanline { fill: url(#scanline-grad); animation: scanline 8s linear infinite; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />
  
  <!-- Side Borders only (Connects top and bottom SVGs) -->
  <line x1="10" y1="0" x2="10" y2="230" class="border-line" />
  <line x1="790" y1="0" x2="790" y2="230" class="border-line" />

  <!-- Uptime Command -->
  <text x="30" y="25" class="text-dim">retr0@white-server:~$ uptime</text>
  <!-- START_UPTIME -->
  <text x="30" y="45" class="text-green"> 19:12:59 up 47 days, 07:12,  1 user,  load average: 0.05, 0.18, 0.32</text>
  <!-- END_UPTIME -->

  <!-- Load Command -->
  <text x="30" y="75" class="text-dim">retr0@white-server:~$ systemctl status system-load.service</text>
  <text x="30" y="95" class="text-green">● system-load.service - Resource Monitor (running)</text>
  <!-- START_SYSTEM_LOAD -->
  <text x="30" y="115" class="text-green">cpu_load: [███████████████░░░░░] 75%</text>
  <text x="30" y="135" class="text-green">ram_load: [███████████░░░░░░░░░] 59%</text>
  <!-- END_SYSTEM_LOAD -->

  <!-- Operations Command -->
  <text x="30" y="165" class="text-dim">retr0@white-server:~$ cat /var/log/active_ops.log</text>
  <!-- START_OPS -->
  <text x="30" y="185" class="text-dim">PID_8043: subdomain-scanner-go [85%] (optimizing_concurrency)</text>
  <text x="30" y="200" class="text-dim">PID_2210: preparation-osep-cert [50%] (active_study)</text>
  <text x="30" y="215" class="text-dim">PID_1337: ctf-competition-engagement [running] (solving_reverse_pwn)</text>
  <!-- END_OPS -->

  <!-- CRT Scanline overlay -->
  <rect width="100%" height="230" class="scanline" pointer-events="none" />
</svg>
