<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 290" width="100%" height="290">
  <defs>
    <!-- Phosphor Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanline Gradient -->
    <linearGradient id="scanline-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FF99" stop-opacity="0" />
      <stop offset="50%" stop-color="#00FF99" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#00FF99" stop-opacity="0" />
    </linearGradient>
  </defs>
  <style>
    @keyframes scanline {
      0% { transform: translateY(-290px); }
      100% { transform: translateY(290px); }
    }
    .bg { fill: #07090e; }
    .text-green { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #00FF99; }
    .text-neon { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #00FF99; filter: url(#neon-glow); }
    .text-dim { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #008855; }
    .text-sub { font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; fill: #00FF99; opacity: 0.7; }
    
    .border-line { stroke: #00FF99; stroke-width: 1.5; stroke-opacity: 0.25; }
    .window-dot { stroke: #00FF99; stroke-width: 1.5; fill: none; opacity: 0.5; }
    .window-dot-filled { fill: #00FF99; opacity: 0.8; }
    .scanline { fill: url(#scanline-grad); animation: scanline 8s linear infinite; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />
  
  <!-- Terminal Border Window frame (Fully Closed) -->
  <path d="M 10,10 L 790,10 L 790,280 L 10,280 Z" fill="none" class="border-line" />
  <path d="M 10,40 L 790,40" class="border-line" />

  <!-- Terminal Window Controls -->
  <circle cx="30" cy="25" r="5" class="window-dot-filled" />
  <circle cx="48" cy="25" r="5" class="window-dot" />
  <circle cx="66" cy="25" r="5" class="window-dot" />
  
  <text x="400" y="29" text-anchor="middle" class="text-sub">session: systemctl status system-load.service</text>

  <!-- Uptime Command -->
  <text x="30" y="65" class="text-dim">retr0@white-server:~$ uptime</text>
  <!-- START_UPTIME -->
  <text x="30" y="85" class="text-green"> 19:56:46 up 47 days, 07:56,  1 user,  load average: 0.12, 0.25, 0.49</text>
  <!-- END_UPTIME -->

  <!-- Load Command -->
  <text x="30" y="115" class="text-dim">retr0@white-server:~$ systemctl status system-load.service</text>
  <text x="30" y="135" class="text-green">● system-load.service - Resource Monitor (running)</text>
  <!-- START_SYSTEM_LOAD -->
  <text x="30" y="155" class="text-green">cpu_load: [</text>
  <rect x="110" y="145" width="150" height="10" fill="#15202e" rx="2" />
  <rect x="110" y="145" width="122" height="10" fill="#00FF99" filter="url(#neon-glow)" rx="2" />
  <text x="270" y="155" class="text-green">] 82%</text>
  <text x="30" y="175" class="text-green">ram_load: [</text>
  <rect x="110" y="165" width="150" height="10" fill="#15202e" rx="2" />
  <rect x="110" y="165" width="85" height="10" fill="#00FF99" filter="url(#neon-glow)" rx="2" />
  <text x="270" y="175" class="text-green">] 57%</text>
  <!-- END_SYSTEM_LOAD -->

  <!-- Operations Command -->
  <text x="30" y="205" class="text-dim">retr0@white-server:~$ cat /var/log/active_ops.log</text>
  <!-- START_OPS -->
  <text x="30" y="225" class="text-dim">PID_8043: subdomain-scanner-go [85%] (optimizing_concurrency)</text>
  <text x="30" y="240" class="text-dim">PID_2210: preparation-osep-cert [50%] (active_study)</text>
  <text x="30" y="255" class="text-dim">PID_1337: ctf-competition-engagement [running] (solving_reverse_pwn)</text>
  <!-- END_OPS -->

  <!-- CRT Scanline overlay -->
  <rect width="100%" height="290" class="scanline" pointer-events="none" />
</svg>
