<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 50" width="100%" height="50">
  <defs>
    <!-- Phosphor Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanline Gradient -->
    <linearGradient id="scanline-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00FF99" stop-opacity="0" />
      <stop offset="50%" stop-color="#00FF99" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#00FF99" stop-opacity="0" />
    </linearGradient>
  </defs>
  <style>
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .bg { fill: #07090e; }
    .text-green { font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; fill: #00FF99; }
    .text-bold { font-weight: bold; }
    .text-neon { font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; fill: #00FF99; filter: url(#neon-glow); animation: pulse 2s infinite; }
    .border-line { stroke: #00FF99; stroke-width: 1.5; stroke-opacity: 0.3; }
    .scanline { fill: url(#scanline-grad); opacity: 0.5; }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />
  
  <!-- Terminal Border Window frame (Fully Closed) -->
  <path d="M 10,5 L 790,5 L 790,45 L 10,45 Z" fill="none" class="border-line" />

  <!-- Prompt text -->
  <text x="30" y="28" class="text-green text-bold">retr0@white-server:~$</text>
  <text x="205" y="28" class="text-green">gpg --decrypt contacts.asc.gpg</text>
  <text x="435" y="28" class="text-green" style="animation: blink 1s infinite;">█</text>

  <!-- Interactive Hint -->
  <text x="765" y="28" text-anchor="end" class="text-neon">[ CLICK TO RUN ]</text>

  <!-- CRT Scanline overlay -->
  <rect width="100%" height="50" class="scanline" pointer-events="none" />
</svg>
